name: Test Installation Script

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'install/linux/**'
      - '.github/workflows/test-install-script.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'install/linux/**'
      - '.github/workflows/test-install-script.yml'

jobs:
  shellcheck:
    name: Shellcheck Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run shellcheck
        run: shellcheck install/linux/install.sh install/linux/macvlan-setup.sh

  bats-tests:
    name: Bats Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run Bats tests
        run: bats install/linux/test/install.bats

  docker-tests:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [test-normal, test-custom-env, test-chroot, test-validation, test-commands]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run test - ${{ matrix.target }}
        run: |
          docker build -f install/linux/Dockerfile.test \
            --target ${{ matrix.target }} \
            -t fdm-monster-test-${{ matrix.target }} .
          docker run --rm fdm-monster-test-${{ matrix.target }}

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [shellcheck, bats-tests, docker-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "Shellcheck: ${{ needs.shellcheck.result }}"
          echo "Bats Tests: ${{ needs.bats-tests.result }}"
          echo "Docker Tests: ${{ needs.docker-tests.result }}"

          if [ "${{ needs.shellcheck.result }}" != "success" ] || \
             [ "${{ needs.bats-tests.result }}" != "success" ] || \
             [ "${{ needs.docker-tests.result }}" != "success" ]; then
            echo "Some tests failed!"
            exit 1
          fi

          echo "All tests passed!"
